name: test
jobs:
  reusable-1:
    name: reusable-1
    needs:
      - reusable-1.job1
      - reusable-1.job2
      - reusable-1.job3
    runs-on: []
    if: false
__metadata:
  workflow_call_id: b5a9f46f1f2513d7777fde50b169d323a6519e349cc175484c947ac315a209ed
---
name: test
jobs:
  reusable-1.job1:
    name: job1
    runs-on: linux
    steps:
      - id: step1
        run: echo "my-step-output=$(uname -a)" >> $GITHUB_OUTPUT
    outputs:
      my-job-output: ${{ steps.step1.outputs.my-step-output }}
__metadata:
  workflow_call_parent: b5a9f46f1f2513d7777fde50b169d323a6519e349cc175484c947ac315a209ed
---
name: test
jobs:
  reusable-1.job2:
    name: job2
    needs:
      - reusable-1.job1
    runs-on: linux
    steps:
      - id: output-arch
        run: echo "my-arch=$(uname -m)"
      - run: ${{ format('That''s better than {0}, right?', needs[format('{0}.{1}', 'reusable-1', 'job1')].outputs.my-job-output) }}
    outputs:
      my-arch: ${{ steps.output-arch.outputs.my-arch }}
__metadata:
  workflow_call_parent: b5a9f46f1f2513d7777fde50b169d323a6519e349cc175484c947ac315a209ed
---
name: test
jobs:
  reusable-1.job3:
    name: job3
    needs:
      - reusable-1.job1
      - reusable-1.job2
    runs-on: linux
    steps:
      - run: uname -a
    container:
      options: ${{ format('--platform {0}', needs[format('{0}.{1}', 'reusable-1', 'job2')].outputs.my-arch) }}
__metadata:
  workflow_call_parent: b5a9f46f1f2513d7777fde50b169d323a6519e349cc175484c947ac315a209ed
