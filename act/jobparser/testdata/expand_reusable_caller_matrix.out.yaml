name: test
jobs:
  reusable-1:
    name: reusable-1 (debian, amd64)
    needs:
      - reusable-1.job1
    runs-on: []
    if: false
    strategy:
      matrix:
        os:
          - debian
        platform:
          - amd64
---
name: test
jobs:
  reusable-1:
    name: reusable-1 (debian, arm64)
    needs:
      - reusable-1.job1
    runs-on: []
    if: false
    strategy:
      matrix:
        os:
          - debian
        platform:
          - arm64
---
name: test
jobs:
  reusable-1:
    name: reusable-1 (nixos, amd64)
    needs:
      - reusable-1.job1
    runs-on: []
    if: false
    strategy:
      matrix:
        os:
          - nixos
        platform:
          - amd64
---
name: test
jobs:
  reusable-1:
    name: reusable-1 (nixos, arm64)
    needs:
      - reusable-1.job1
    runs-on: []
    if: false
    strategy:
      matrix:
        os:
          - nixos
        platform:
          - arm64
---
name: test
"on":
  workflow_call:
    inputs:
      os:
        default: debian
        type: string
      platform:
        default: amd64
        type: string
jobs:
  reusable-1.job1:
    name: job1
    runs-on: ubuntu
    steps:
      - run: |
          echo os=${{ inputs.os }}
          echo platform=${{ inputs.platform }}
